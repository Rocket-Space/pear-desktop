name: Build After Linux Arch Artifacts

on:
  workflow_run:
    workflows: ["Build Pear Desktop Linux Arch"]
    types:
      - completed

permissions: {}

env:
  NODE_VERSION: "22.x"

jobs:
  build:
    name: Build Linux Arch Artifacts
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
        with:
          version: 10
          run_install: false

      - name: Setup NodeJS
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install makeself
        run: sudo apt-get update && sudo apt-get install -y makeself

      - name: Build self-extracting setup for Arch/CachyOS
        run: |
          pnpm dist:linux:tar-gz
          # Extract the tar.gz to create the makeself archive
          tar xzf pack/*.tar.gz -C pack/
          EXTRACTED_DIR=$(find pack/ -maxdepth 1 -type d ! -name pack | head -1)
          cp assets/linux-installer.sh "$EXTRACTED_DIR/install.sh"
          chmod +x "$EXTRACTED_DIR/install.sh"
          VERSION=$(node -pe "require('./package.json').version")
          makeself --gzip "$EXTRACTED_DIR" "pack/pear-desktop-${VERSION}-setup" "Pear Desktop Installer" ./install.sh
          # Clean up, keep only the setup executable
          rm -f pack/*.tar.gz
          rm -rf "$EXTRACTED_DIR"

      - name: Upload artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: build-artifacts-linux-arch
          path: pack/pear-desktop-*-setup
          retention-days: 7
          if-no-files-found: error
